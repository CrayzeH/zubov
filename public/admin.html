<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Доктор Зубов</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="assets/chat-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f4f7fb;
            color: #1f2937;
        }

        .admin-shell {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .admin-title {
            margin: 0;
            font-size: 30px;
            color: #1f3b63;
        }

        .admin-subtitle {
            margin: 6px 0 0;
            color: #64748b;
        }

        .admin-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .admin-tab {
            border: 1px solid #dbe3ef;
            background: white;
            color: #2f4b6b;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .admin-tab.active {
            background: #3270ce;
            color: white;
            border-color: #3270ce;
        }

        .admin-section {
            display: none;
            background: white;
            border: 1px solid #e3eaf3;
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 6px 18px rgba(24, 44, 78, 0.06);
        }

        .admin-section.active {
            display: block;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .section-head h2 {
            margin: 0;
            font-size: 22px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: minmax(280px, 360px) 1fr;
            gap: 18px;
            align-items: start;
        }

        .admin-form {
            display: grid;
            gap: 10px;
            background: #f8fbff;
            border: 1px solid #e3eaf3;
            border-radius: 8px;
            padding: 14px;
        }

        .admin-form h3 {
            margin: 0 0 4px;
            font-size: 17px;
        }

        .admin-form label {
            display: grid;
            gap: 5px;
            font-size: 13px;
            font-weight: 600;
            color: #46566a;
        }

        .admin-form input,
        .admin-form textarea,
        .admin-form select {
            width: 100%;
            border: 1px solid #ccd8e6;
            border-radius: 7px;
            padding: 9px 10px;
            font: inherit;
            background: white;
        }

        .admin-form textarea {
            min-height: 84px;
            resize: vertical;
        }

        .check-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .check-row input {
            width: auto;
        }

        .admin-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .admin-btn {
            border: none;
            background: #3270ce;
            color: white;
            border-radius: 7px;
            padding: 9px 12px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .admin-btn.secondary {
            background: #e8eef7;
            color: #27415f;
        }

        .admin-btn.danger {
            background: #dc3545;
        }

        .admin-btn.success {
            background: #0f9f6e;
        }

        .admin-btn.warning {
            background: #d97706;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid #e3eaf3;
            border-radius: 8px;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
        }

        .admin-table th,
        .admin-table td {
            padding: 10px;
            border-bottom: 1px solid #e8eef7;
            text-align: left;
            vertical-align: top;
            font-size: 13px;
        }

        .admin-table th {
            background: #f3f7fc;
            color: #334155;
            font-weight: 800;
        }

        .status-pill {
            display: inline-flex;
            padding: 4px 8px;
            border-radius: 999px;
            background: #e8eef7;
            font-size: 12px;
            font-weight: 700;
        }

        .status-pending { color: #b45309; background: #fef3c7; }
        .status-confirmed { color: #047857; background: #d1fae5; }
        .status-completed { color: #4338ca; background: #e0e7ff; }
        .status-cancelled,
        .status-rejected { color: #b91c1c; background: #fee2e2; }

        .admin-message {
            min-height: 22px;
            margin-bottom: 12px;
            color: #0f766e;
            font-weight: 700;
        }

        .admin-message.error {
            color: #dc2626;
        }

        .admin-empty {
            padding: 22px;
            color: #64748b;
            text-align: center;
        }

        @media (max-width: 900px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }

            .admin-header {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<main class="admin-shell">
    <div class="admin-header">
        <div>
            <h1 class="admin-title">Админ-панель</h1>
            <p class="admin-subtitle">Управление услугами, врачами, акциями, слайдером, заявками и правами пользователей</p>
        </div>
        <div class="admin-actions">
            <a class="admin-btn secondary" href="/">На сайт</a>
            <button class="admin-btn danger" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div id="adminMessage" class="admin-message"></div>

    <nav class="admin-tabs">
        <button class="admin-tab active" data-tab="appointments">Заявки</button>
        <button class="admin-tab" data-tab="services">Услуги</button>
        <button class="admin-tab" data-tab="doctors">Врачи</button>
        <button class="admin-tab" data-tab="promotions">Акции</button>
        <button class="admin-tab" data-tab="gallery">Слайдер О нас</button>
        <button class="admin-tab" data-tab="users">Пользователи</button>
    </nav>

    <section id="appointments" class="admin-section active">
        <div class="section-head">
            <h2>Заявки на прием</h2>
            <button class="admin-btn secondary" onclick="loadAppointments()">Обновить</button>
        </div>
        <div class="table-wrap"><table class="admin-table" id="appointmentsTable"></table></div>
    </section>

    <section id="services" class="admin-section">
        <div class="section-head"><h2>Услуги</h2></div>
        <div class="admin-grid">
            <form class="admin-form" id="serviceForm">
                <h3 id="serviceFormTitle">Добавить услугу</h3>
                <input type="hidden" id="serviceId">
                <label>Название <input id="serviceTitle" required></label>
                <label>Описание <textarea id="serviceDescription" required></textarea></label>
                <label>Иконка Font Awesome <input id="serviceIcon" placeholder="fa-tooth" required></label>
                <label>Категория <input id="serviceCategory" placeholder="therapy" required></label>
                <label>Цена <input id="servicePrice" type="number" min="0" required></label>
                <label>Старая цена <input id="serviceOldPrice" type="number" min="0"></label>
                <label class="check-row"><input id="servicePopular" type="checkbox"> Популярная услуга</label>
                <label class="check-row"><input id="serviceKids" type="checkbox" checked> Для детей</label>
                <div class="admin-actions">
                    <button class="admin-btn" type="submit">Сохранить</button>
                    <button class="admin-btn secondary" type="button" onclick="resetServiceForm()">Сброс</button>
                </div>
            </form>
            <div class="table-wrap"><table class="admin-table" id="servicesTable"></table></div>
        </div>
    </section>

    <section id="doctors" class="admin-section">
        <div class="section-head"><h2>Врачи</h2></div>
        <div class="admin-grid">
            <form class="admin-form" id="doctorForm">
                <h3 id="doctorFormTitle">Добавить врача</h3>
                <input type="hidden" id="doctorId">
                <label>ФИО <input id="doctorName" required></label>
                <label>Должность <input id="doctorPosition" required></label>
                <label>Стаж <input id="doctorExperience" required></label>
                <label>Описание <textarea id="doctorDescription"></textarea></label>
                <label>Фото <input id="doctorPhoto" placeholder="assets/doctor1.jpg"></label>
                <label>Специализация <input id="doctorSpecialization" placeholder="Терапия, Детская стоматология"></label>
                <label class="check-row"><input id="doctorActive" type="checkbox" checked> Показывать на сайте</label>
                <div class="admin-actions">
                    <button class="admin-btn" type="submit">Сохранить</button>
                    <button class="admin-btn secondary" type="button" onclick="resetDoctorForm()">Сброс</button>
                </div>
            </form>
            <div class="table-wrap"><table class="admin-table" id="doctorsTable"></table></div>
        </div>
    </section>

    <section id="promotions" class="admin-section">
        <div class="section-head"><h2>Акции</h2></div>
        <div class="admin-grid">
            <form class="admin-form" id="promotionForm">
                <h3 id="promotionFormTitle">Добавить акцию</h3>
                <input type="hidden" id="promotionId">
                <label>Название <input id="promotionTitle" required></label>
                <label>Описание <textarea id="promotionDescription" required></textarea></label>
                <label>Скидка, % <input id="promotionDiscount" type="number" min="0" max="100" required></label>
                <label>Старая цена <input id="promotionOldPrice" type="number" min="0"></label>
                <label>Новая цена <input id="promotionNewPrice" type="number" min="0"></label>
                <label>Бейдж <input id="promotionBadge" placeholder="АКЦИЯ"></label>
                <label>Цвет или градиент <input id="promotionColor" placeholder="linear-gradient(...)"></label>
                <label>Иконка Font Awesome <input id="promotionIcon" placeholder="fa-gift"></label>
                <label>Дата окончания <input id="promotionEndDate" type="date"></label>
                <label class="check-row"><input id="promotionActive" type="checkbox" checked> Показывать на сайте</label>
                <div class="admin-actions">
                    <button class="admin-btn" type="submit">Сохранить</button>
                    <button class="admin-btn secondary" type="button" onclick="resetPromotionForm()">Сброс</button>
                </div>
            </form>
            <div class="table-wrap"><table class="admin-table" id="promotionsTable"></table></div>
        </div>
    </section>

    <section id="gallery" class="admin-section">
        <div class="section-head"><h2>Фото для слайдера на странице О нас</h2></div>
        <div class="admin-grid">
            <form class="admin-form" id="galleryForm">
                <h3 id="galleryFormTitle">Добавить фото</h3>
                <input type="hidden" id="galleryId">
                <label>Путь к фото в БД <input id="gallerySrc" placeholder="assets/gallery1.jpg" required></label>
                <label>Выбрать файл <input id="galleryFile" type="file" accept="image/*"></label>
                <label>Описание <input id="galleryAlt" required></label>
                <label>Категория <input id="galleryCategory" value="clinic"></label>
                <label>Порядок <input id="gallerySort" type="number" min="0" value="0"></label>
                <div class="admin-actions">
                    <button class="admin-btn" type="submit">Сохранить</button>
                    <button class="admin-btn secondary" type="button" onclick="resetGalleryForm()">Сброс</button>
                </div>
            </form>
            <div class="table-wrap"><table class="admin-table" id="galleryTable"></table></div>
        </div>
    </section>

    <section id="users" class="admin-section">
        <div class="section-head">
            <h2>Пользователи и администраторы</h2>
            <button class="admin-btn secondary" onclick="loadUsers()">Обновить</button>
        </div>
        <div class="table-wrap"><table class="admin-table" id="usersTable"></table></div>
    </section>
</main>

<script>
let services = [];
let doctors = [];
let promotions = [];
let gallery = [];
let users = [];
let appointments = [];

const api = async (url, options = {}) => {
    const response = await fetch(url, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(data.message || data.error || 'Ошибка запроса');
    return data;
};

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text ?? '';
    return div.innerHTML;
}

function showMessage(text, isError = false) {
    const el = document.getElementById('adminMessage');
    el.textContent = text;
    el.classList.toggle('error', isError);
    if (text) setTimeout(() => { el.textContent = ''; el.classList.remove('error'); }, 3000);
}

function boolValue(id) {
    return document.getElementById(id).checked;
}

function nullableNumber(id) {
    const value = document.getElementById(id).value;
    return value === '' ? null : Number(value);
}

function resolveGallerySrc(src) {
    if (!src) return '';
    if (src.startsWith('http') || src.startsWith('data:') || src.startsWith('/')) return src;
    if (src.startsWith('assets/assets/')) return src;
    if (src.startsWith('assets/')) return 'assets/' + src;
    return 'assets/assets/' + src;
}

function activateTab(tabId) {
    document.querySelectorAll('.admin-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));
    document.querySelectorAll('.admin-section').forEach(section => section.classList.toggle('active', section.id === tabId));
}

async function loadAll() {
    await Promise.all([loadAppointments(), loadServices(), loadDoctors(), loadPromotions(), loadGallery(), loadUsers()]);
}

async function loadAppointments() {
    const data = await api('/api/admin/appointments');
    appointments = data.appointments || [];
    renderAppointments();
}

function renderAppointments() {
    const table = document.getElementById('appointmentsTable');
    if (!appointments.length) {
        table.innerHTML = '<tr><td class="admin-empty">Заявок пока нет</td></tr>';
        return;
    }
    table.innerHTML = `
        <thead><tr><th>ID</th><th>Пациент</th><th>Услуга и врач</th><th>Дата</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody>
            ${appointments.map(item => `
                <tr>
                    <td>${item.id}</td>
                    <td>
                        <strong>${escapeHtml(item.user_name || '')}</strong><br>
                        ${escapeHtml(item.user_phone || '')}<br>
                        ${escapeHtml(item.user_email || '')}<br>
                        ${escapeHtml(item.child_name || '')} ${item.child_age ? `(${item.child_age} лет)` : ''}
                    </td>
                    <td>
                        <strong>${escapeHtml(item.service_name || 'Услуга удалена')}</strong><br>
                        ${escapeHtml(item.doctor_name || 'Врач удален')}<br>
                        ${item.comment ? `<small>${escapeHtml(item.comment)}</small>` : ''}
                    </td>
                    <td>${escapeHtml(item.appointment_date)} ${escapeHtml(item.appointment_time)}</td>
                    <td><span class="status-pill status-${item.status}">${statusText(item.status)}</span></td>
                    <td>
                        <div class="admin-actions">
                            <button class="admin-btn success" onclick="setAppointmentStatus(${item.id}, 'confirmed')">Одобрить</button>
                            <button class="admin-btn warning" onclick="setAppointmentStatus(${item.id}, 'pending')">В ожидание</button>
                            <button class="admin-btn danger" onclick="setAppointmentStatus(${item.id}, 'rejected')">Отклонить</button>
                            <button class="admin-btn secondary" onclick="setAppointmentStatus(${item.id}, 'completed')">Завершить</button>
                        </div>
                    </td>
                </tr>
            `).join('')}
        </tbody>`;
}

function statusText(status) {
    return {
        pending: 'Ожидает',
        confirmed: 'Одобрена',
        completed: 'Завершена',
        cancelled: 'Отменена',
        rejected: 'Отклонена'
    }[status] || status;
}

async function setAppointmentStatus(id, status) {
    await api(`/api/admin/appointments/${id}/status`, { method: 'PUT', body: JSON.stringify({ status }) });
    showMessage('Статус заявки обновлен');
    await loadAppointments();
}

async function loadServices() {
    const data = await api('/api/admin/services');
    services = data.services || [];
    document.getElementById('servicesTable').innerHTML = `
        <thead><tr><th>ID</th><th>Услуга</th><th>Цена</th><th>Категория</th><th>Действия</th></tr></thead>
        <tbody>${services.map(item => `
            <tr>
                <td>${item.id}</td>
                <td><strong>${escapeHtml(item.title)}</strong><br><small>${escapeHtml(item.description)}</small></td>
                <td>${Number(item.price).toLocaleString()} ₽</td>
                <td>${escapeHtml(item.category)}</td>
                <td><div class="admin-actions"><button class="admin-btn secondary" onclick="editService(${item.id})">Редактировать</button><button class="admin-btn danger" onclick="deleteEntity('services', ${item.id}, loadServices)">Удалить</button></div></td>
            </tr>`).join('')}</tbody>`;
}

function resetServiceForm() {
    document.getElementById('serviceForm').reset();
    document.getElementById('serviceId').value = '';
    document.getElementById('serviceKids').checked = true;
    document.getElementById('serviceFormTitle').textContent = 'Добавить услугу';
}

function editService(id) {
    const item = services.find(row => row.id === id);
    if (!item) return;
    document.getElementById('serviceFormTitle').textContent = 'Редактировать услугу';
    document.getElementById('serviceId').value = item.id;
    document.getElementById('serviceTitle').value = item.title || '';
    document.getElementById('serviceDescription').value = item.description || '';
    document.getElementById('serviceIcon').value = item.icon || '';
    document.getElementById('serviceCategory').value = item.category || '';
    document.getElementById('servicePrice').value = item.price ?? 0;
    document.getElementById('serviceOldPrice').value = item.old_price ?? '';
    document.getElementById('servicePopular').checked = item.is_popular === 1;
    document.getElementById('serviceKids').checked = item.for_kids !== 0;
}

document.getElementById('serviceForm').addEventListener('submit', async e => {
    e.preventDefault();
    const id = document.getElementById('serviceId').value;
    const payload = {
        title: document.getElementById('serviceTitle').value.trim(),
        description: document.getElementById('serviceDescription').value.trim(),
        icon: document.getElementById('serviceIcon').value.trim(),
        category: document.getElementById('serviceCategory').value.trim(),
        price: Number(document.getElementById('servicePrice').value),
        old_price: nullableNumber('serviceOldPrice'),
        is_popular: boolValue('servicePopular'),
        for_kids: boolValue('serviceKids')
    };
    await api(`/api/admin/services${id ? `/${id}` : ''}`, { method: id ? 'PUT' : 'POST', body: JSON.stringify(payload) });
    showMessage('Услуга сохранена');
    resetServiceForm();
    await loadServices();
});

async function loadDoctors() {
    const data = await api('/api/admin/doctors');
    doctors = data.doctors || [];
    document.getElementById('doctorsTable').innerHTML = `
        <thead><tr><th>ID</th><th>Врач</th><th>Специализация</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody>${doctors.map(item => `
            <tr>
                <td>${item.id}</td>
                <td><strong>${escapeHtml(item.name)}</strong><br>${escapeHtml(item.position)}<br><small>${escapeHtml(item.experience)}</small></td>
                <td>${escapeHtml(item.specialization || '')}</td>
                <td>${item.is_active ? 'На сайте' : 'Скрыт'}</td>
                <td><div class="admin-actions"><button class="admin-btn secondary" onclick="editDoctor(${item.id})">Редактировать</button><button class="admin-btn danger" onclick="deleteEntity('doctors', ${item.id}, loadDoctors)">Скрыть</button></div></td>
            </tr>`).join('')}</tbody>`;
}

function resetDoctorForm() {
    document.getElementById('doctorForm').reset();
    document.getElementById('doctorId').value = '';
    document.getElementById('doctorActive').checked = true;
    document.getElementById('doctorFormTitle').textContent = 'Добавить врача';
}

function editDoctor(id) {
    const item = doctors.find(row => row.id === id);
    if (!item) return;
    document.getElementById('doctorFormTitle').textContent = 'Редактировать врача';
    document.getElementById('doctorId').value = item.id;
    document.getElementById('doctorName').value = item.name || '';
    document.getElementById('doctorPosition').value = item.position || '';
    document.getElementById('doctorExperience').value = item.experience || '';
    document.getElementById('doctorDescription').value = item.description || '';
    document.getElementById('doctorPhoto').value = item.photo || '';
    document.getElementById('doctorSpecialization').value = item.specialization || '';
    document.getElementById('doctorActive').checked = item.is_active !== 0;
}

document.getElementById('doctorForm').addEventListener('submit', async e => {
    e.preventDefault();
    const id = document.getElementById('doctorId').value;
    const payload = {
        name: document.getElementById('doctorName').value.trim(),
        position: document.getElementById('doctorPosition').value.trim(),
        experience: document.getElementById('doctorExperience').value.trim(),
        description: document.getElementById('doctorDescription').value.trim(),
        photo: document.getElementById('doctorPhoto').value.trim(),
        specialization: document.getElementById('doctorSpecialization').value.trim(),
        is_active: boolValue('doctorActive')
    };
    await api(`/api/admin/doctors${id ? `/${id}` : ''}`, { method: id ? 'PUT' : 'POST', body: JSON.stringify(payload) });
    showMessage('Врач сохранен');
    resetDoctorForm();
    await loadDoctors();
});

async function loadPromotions() {
    const data = await api('/api/admin/promotions');
    promotions = data.promotions || [];
    document.getElementById('promotionsTable').innerHTML = `
        <thead><tr><th>ID</th><th>Акция</th><th>Скидка</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody>${promotions.map(item => `
            <tr>
                <td>${item.id}</td>
                <td><strong>${escapeHtml(item.title)}</strong><br><small>${escapeHtml(item.description)}</small></td>
                <td>${item.discount}%</td>
                <td>${item.is_active ? 'На сайте' : 'Скрыта'}</td>
                <td><div class="admin-actions"><button class="admin-btn secondary" onclick="editPromotion(${item.id})">Редактировать</button><button class="admin-btn danger" onclick="deleteEntity('promotions', ${item.id}, loadPromotions)">Скрыть</button></div></td>
            </tr>`).join('')}</tbody>`;
}

function resetPromotionForm() {
    document.getElementById('promotionForm').reset();
    document.getElementById('promotionId').value = '';
    document.getElementById('promotionActive').checked = true;
    document.getElementById('promotionFormTitle').textContent = 'Добавить акцию';
}

function editPromotion(id) {
    const item = promotions.find(row => row.id === id);
    if (!item) return;
    document.getElementById('promotionFormTitle').textContent = 'Редактировать акцию';
    document.getElementById('promotionId').value = item.id;
    document.getElementById('promotionTitle').value = item.title || '';
    document.getElementById('promotionDescription').value = item.description || '';
    document.getElementById('promotionDiscount').value = item.discount ?? 0;
    document.getElementById('promotionOldPrice').value = item.old_price ?? '';
    document.getElementById('promotionNewPrice').value = item.new_price ?? '';
    document.getElementById('promotionBadge').value = item.badge || '';
    document.getElementById('promotionColor').value = item.color || '';
    document.getElementById('promotionIcon').value = item.icon || '';
    document.getElementById('promotionEndDate').value = item.end_date || '';
    document.getElementById('promotionActive').checked = item.is_active !== 0;
}

document.getElementById('promotionForm').addEventListener('submit', async e => {
    e.preventDefault();
    const id = document.getElementById('promotionId').value;
    const payload = {
        title: document.getElementById('promotionTitle').value.trim(),
        description: document.getElementById('promotionDescription').value.trim(),
        discount: Number(document.getElementById('promotionDiscount').value),
        old_price: nullableNumber('promotionOldPrice'),
        new_price: nullableNumber('promotionNewPrice'),
        badge: document.getElementById('promotionBadge').value.trim(),
        color: document.getElementById('promotionColor').value.trim(),
        icon: document.getElementById('promotionIcon').value.trim(),
        end_date: document.getElementById('promotionEndDate').value,
        is_active: boolValue('promotionActive')
    };
    await api(`/api/admin/promotions${id ? `/${id}` : ''}`, { method: id ? 'PUT' : 'POST', body: JSON.stringify(payload) });
    showMessage('Акция сохранена');
    resetPromotionForm();
    await loadPromotions();
});

async function loadGallery() {
    const data = await api('/api/admin/gallery');
    gallery = data.images || [];
    document.getElementById('galleryTable').innerHTML = `
        <thead><tr><th>ID</th><th>Фото</th><th>Описание</th><th>Порядок</th><th>Действия</th></tr></thead>
        <tbody>${gallery.map(item => `
            <tr>
                <td>${item.id}</td>
                <td><img src="${escapeHtml(resolveGallerySrc(item.src))}" alt="" style="width: 92px; height: 58px; object-fit: cover; border-radius: 6px;"><br><small>${escapeHtml(item.src)}</small></td>
                <td>${escapeHtml(item.alt)}</td>
                <td>${item.sort_order}</td>
                <td><div class="admin-actions"><button class="admin-btn secondary" onclick="editGallery(${item.id})">Редактировать</button><button class="admin-btn danger" onclick="deleteEntity('gallery', ${item.id}, loadGallery)">Удалить</button></div></td>
            </tr>`).join('')}</tbody>`;
}

function resetGalleryForm() {
    document.getElementById('galleryForm').reset();
    document.getElementById('galleryId').value = '';
    document.getElementById('galleryCategory').value = 'clinic';
    document.getElementById('gallerySort').value = 0;
    document.getElementById('galleryFormTitle').textContent = 'Добавить фото';
}

function editGallery(id) {
    const item = gallery.find(row => row.id === id);
    if (!item) return;
    document.getElementById('galleryFormTitle').textContent = 'Редактировать фото';
    document.getElementById('galleryId').value = item.id;
    document.getElementById('gallerySrc').value = item.src || '';
    document.getElementById('galleryAlt').value = item.alt || '';
    document.getElementById('galleryCategory').value = item.category || 'clinic';
    document.getElementById('gallerySort').value = item.sort_order ?? 0;
}

document.getElementById('galleryForm').addEventListener('submit', async e => {
    e.preventDefault();
    const fileInput = document.getElementById('galleryFile');
    if (fileInput.files && fileInput.files[0]) {
        const upload = await uploadGalleryFile(fileInput.files[0]);
        document.getElementById('gallerySrc').value = upload.src;
        if (!document.getElementById('galleryAlt').value.trim()) {
            document.getElementById('galleryAlt').value = fileInput.files[0].name;
        }
    }

    const id = document.getElementById('galleryId').value;
    const payload = {
        src: document.getElementById('gallerySrc').value.trim(),
        alt: document.getElementById('galleryAlt').value.trim(),
        category: document.getElementById('galleryCategory').value.trim() || 'clinic',
        sort_order: Number(document.getElementById('gallerySort').value || 0)
    };
    await api(`/api/admin/gallery${id ? `/${id}` : ''}`, { method: id ? 'PUT' : 'POST', body: JSON.stringify(payload) });
    showMessage('Фото сохранено');
    resetGalleryForm();
    await loadGallery();
});

document.getElementById('galleryFile').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!document.getElementById('galleryAlt').value.trim()) {
        document.getElementById('galleryAlt').value = file.name;
    }
});

async function uploadGalleryFile(file) {
    const response = await fetch('/api/admin/gallery/upload', {
        method: 'POST',
        credentials: 'include',
        headers: {
            'Content-Type': file.type || 'image/jpeg',
            'X-File-Name': encodeURIComponent(file.name)
        },
        body: file
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(data.message || data.error || 'Ошибка загрузки файла');
    return data;
}

async function loadUsers() {
    const data = await api('/api/admin/users');
    users = data.users || [];
    document.getElementById('usersTable').innerHTML = `
        <thead><tr><th>ID</th><th>Пользователь</th><th>Телефон</th><th>Роль</th><th>Действия</th></tr></thead>
        <tbody>${users.map(item => `
            <tr>
                <td>${item.id}</td>
                <td><strong>${escapeHtml(item.name)}</strong><br>${escapeHtml(item.email)}</td>
                <td>${escapeHtml(item.phone)}</td>
                <td><span class="status-pill">${item.role}</span></td>
                <td><button class="admin-btn ${item.role === 'admin' ? 'warning' : 'success'}" onclick="setUserRole(${item.id}, '${item.role === 'admin' ? 'user' : 'admin'}')">${item.role === 'admin' ? 'Сделать пользователем' : 'Сделать админом'}</button></td>
            </tr>`).join('')}</tbody>`;
}

async function setUserRole(id, role) {
    await api(`/api/admin/users/${id}/role`, { method: 'PUT', body: JSON.stringify({ role }) });
    showMessage('Роль пользователя обновлена');
    await loadUsers();
}

async function deleteEntity(type, id, reload) {
    if (!confirm('Подтвердите удаление или скрытие записи')) return;
    await api(`/api/admin/${type}/${id}`, { method: 'DELETE' });
    showMessage('Изменения сохранены');
    await reload();
}

async function logout() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    location.href = '/login';
}

document.querySelectorAll('.admin-tab').forEach(btn => btn.addEventListener('click', () => activateTab(btn.dataset.tab)));

document.addEventListener('DOMContentLoaded', async () => {
    try {
        await api('/api/admin/check');
        await loadAll();
    } catch (error) {
        showMessage(error.message || 'Нет доступа к админ-панели', true);
        setTimeout(() => location.href = '/login', 1200);
    }
});
</script>
<script src="assets/chat-widget.js"></script>
</body>
