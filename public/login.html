                    <label for="email">

                    </label>

                    <div class="error-message" id="emailError"></div>

                <div class="form-group">

                    </label>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    if (data.message) {
                        document.getElementById('formError').textContent = data.message;
                        document.getElementById('formError').classList.add('show');
                    }
                    return;
                }

                document.getElementById('successMessage').textContent = 'Вход выполнен успешно! Перенаправление...';
                document.getElementById('successMessage').classList.add('show');

                setTimeout(() => {
                    window.location.href = '/profile';
                }, 1000);

            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('formError').textContent = 'Ошибка соединения с сервером';
                document.getElementById('formError').classList.add('show');
            }
        });
    </script>
<script>
async function checkAuthStatus() {
    try {
        const response = await fetch('/api/auth/check', {
            method: 'GET',
            credentials: 'include'
        });
        const data = await response.json();
        return data.isAuthenticated === true;
    } catch (error) {
        console.error('Ошибка проверки авторизации:', error);
        return false;
    }
}

async function getUserInfo() {
    try {
        const response = await fetch('/api/auth/user', {
            method: 'GET',
            credentials: 'include'
        });
        if (response.ok) {
            const data = await response.json();
            return data.user;
        }
        return null;
    } catch (error) {
        console.error('Ошибка получения данных пользователя:', error);
        return null;
    }
}

// Обновление иконки пользователя
async function updateUserIcon() {
    const userIconLink = document.getElementById('userIconLink');
    if (!userIconLink) return;

    const isAuthenticated = await checkAuthStatus();

    if (isAuthenticated) {
        userIconLink.href = '/profile';
        const icon = userIconLink.querySelector('i');
        if (icon) {
            icon.classList.remove('fa-user');
            icon.classList.add('fa-user-circle');
        }
        const user = await getUserInfo();
        userIconLink.title = user ? user.name : 'Личный кабинет';
    } else {
        userIconLink.href = '/login';
        const icon = userIconLink.querySelector('i');
        if (icon) {
            icon.classList.remove('fa-user-circle');
            icon.classList.add('fa-user');
        }
        userIconLink.title = 'Войти';
    }
}

// Мобильное меню
// ========== МОБ�?ЛЬНОЕ МЕНЮ ==========
(function() {
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');
    if (!menuToggle || !navMenu) return;

    const body = document.body;

    // Создаем оверлей
    let overlay = document.querySelector('.menu-overlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.className = 'menu-overlay';
        document.body.appendChild(overlay);
    }

    function openMenu() {
        navMenu.classList.add('active');
        overlay.classList.add('active');
        body.classList.add('menu-open');
        const icon = menuToggle.querySelector('i');
        if (icon) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-times');
        }
    }

    function closeMenu() {
        navMenu.classList.remove('active');
        overlay.classList.remove('active');
        body.classList.remove('menu-open');
        const icon = menuToggle.querySelector('i');
        if (icon) {
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
        }
    }

    menuToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        if (navMenu.classList.contains('active')) {
            closeMenu();
        } else {
            openMenu();
        }
    });

    navMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', closeMenu);
    });

    overlay.addEventListener('click', closeMenu);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && navMenu.classList.contains('active')) {
            closeMenu();
        }
    });
})();

// Активная ссылка в меню
function setActiveNavLink() {
    const currentPath = window.location.pathname;
    const navLinks = document.querySelectorAll('.nav-link');

    navLinks.forEach(link => {
        const linkPath = link.getAttribute('href');
        if (linkPath === currentPath ||
            (linkPath !== '/' && currentPath.startsWith(linkPath))) {
            link.classList.add('active');
        } else {
            link.classList.remove('active');
        }
    });
}

// Запуск при загрузке страницы
document.addEventListener('DOMContentLoaded', async function() {
    await updateUserIcon();
    if (typeof initMobileMenu === 'function') initMobileMenu();
    setActiveNavLink();
});
</script>
