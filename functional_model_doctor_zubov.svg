  <path d="M750 420 L805 420" class="line"/>
  <rect x="805" y="405" width="330" height="30" class="small"/>
  <text x="970" y="420" class="text center">Личный кабинет</text>

  <path d="M750 465 L805 465" class="line"/>
  <rect x="805" y="450" width="330" height="30" class="small"/>
