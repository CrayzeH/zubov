  <path d="M345 335 L390 335" class="line"/>

  <rect x="30" y="385" width="315" height="30" class="small"/>
  <text x="187.5" y="400" class="text center">Данные врачей, услуг и акций</text>
  <path d="M345 400 L390 400" class="line"/>

  <rect x="30" y="450" width="315" height="30" class="small"/>
