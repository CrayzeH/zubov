  <path d="M570 250 L570 300" class="line"/>

  <rect x="655" y="40" width="30" height="210" class="small"/>
  <text x="670" y="145" class="text center" transform="rotate(90 670 145)">Данные клиники</text>
  <path d="M670 250 L670 300" class="line"/>

  <rect x="455" y="535" width="30" height="210" class="small"/>
  <text x="470" y="640" class="text center" transform="rotate(90 470 640)">Пользователи системы</text>
  <path d="M470 535 L470 490" class="line"/>

  <rect x="555" y="565" width="30" height="180" class="small"/>
  <text x="570" y="655" class="text center" transform="rotate(90 570 655)">Сервер и база данных</text>
  <path d="M570 565 L570 490" class="line"/>

  <rect x="655" y="555" width="30" height="190" class="small"/>
