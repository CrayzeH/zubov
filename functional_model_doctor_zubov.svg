  <path d="M670 555 L670 490" class="line"/>

  <path d="M750 330 L805 330" class="line"/>
  <rect x="805" y="315" width="330" height="30" class="small"/>
  <text x="970" y="330" class="text center">Страницы сайта</text>

  <path d="M750 375 L805 375" class="line"/>
