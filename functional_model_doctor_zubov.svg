<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222"/>
    </marker>
    <style>
      .box { fill: #fff; stroke: #222; stroke-width: 2; }
      .small { fill: #fff; stroke: #777; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 20px; fill: #111; }
      .center { text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #222; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="390" y="300" width="360" height="190" class="box"/>
  <text x="570" y="395" class="text center">Веб-приложение «Доктор Зубов»</text>

  <rect x="30" y="320" width="315" height="30" class="small"/>
